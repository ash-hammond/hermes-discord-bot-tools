name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install test dependencies
        run: python -m pip install -e '.[dev]'
      - name: Compile
        run: python -m py_compile __init__.py schemas.py tools.py tests/test_plugin.py
      - name: Lint
        run: ruff check .
      - name: Test
        run: pytest tests -q
